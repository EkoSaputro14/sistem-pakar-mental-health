version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/php:8.4

    volumes:
      - ../:/workspace:cached

    command: sleep infinity

    ports:
      - "8000:8000"
      - "5173:5173"

    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistem_pakar_mental

    volumes:
      - mysql_data:/var/lib/mysql

    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  mysql_data: